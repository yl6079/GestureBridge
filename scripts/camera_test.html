<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>摄像头实时预览测试</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Arial, sans-serif;
    }
    body {
      margin: 0;
      padding: 20px;
      max-width: 900px;
      margin-inline: auto;
    }
    h1 {
      margin-top: 0;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 12px;
      cursor: pointer;
    }
    #status {
      margin: 8px 0 12px;
      font-size: 14px;
      color: #2563eb;
      min-height: 1.2em;
    }
    #debug {
      margin: 8px 0 12px;
      font-size: 12px;
      border: 1px solid #8885;
      border-radius: 8px;
      padding: 8px;
      white-space: pre-wrap;
    }
    video, canvas {
      width: 100%;
      max-width: 860px;
      border: 1px solid #8885;
      border-radius: 10px;
      background: #000;
    }
    .hint {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>摄像头实时预览测试</h1>

  <div class="controls">
    <button id="startBtn">开始预览</button>
    <button id="stopBtn">停止预览</button>
    <button id="switchBtn">切换摄像头</button>
    <button id="snapshotBtn">拍照测试</button>
  </div>

  <div id="status">点击“开始预览”后授权摄像头权限。</div>
  <pre id="debug">设备信息将在这里显示。</pre>
  <video id="preview" autoplay playsinline muted></video>
  <canvas id="snapshot" style="display: none; margin-top: 12px;"></canvas>
  <div class="hint">
    如果你在树莓派本机浏览器里打开本页，看得到实时画面就说明摄像头链路可用。
  </div>

  <script>
    const previewEl = document.getElementById("preview");
    const snapshotEl = document.getElementById("snapshot");
    const statusEl = document.getElementById("status");
    const debugEl = document.getElementById("debug");

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const switchBtn = document.getElementById("switchBtn");
    const snapshotBtn = document.getElementById("snapshotBtn");

    let stream = null;
    let videoInputs = [];
    let currentIndex = 0;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.color = isError ? "#dc2626" : "#2563eb";
    }

    function setDebug(message) {
      debugEl.textContent = message;
    }

    function stopCurrentStream() {
      if (!stream) return;
      stream.getTracks().forEach((track) => track.stop());
      stream = null;
      previewEl.srcObject = null;
    }

    async function loadCameraList() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      videoInputs = devices.filter((d) => d.kind === "videoinput");
      if (videoInputs.length === 0) {
        throw new Error("未检测到可用摄像头设备。");
      }
      if (currentIndex >= videoInputs.length) {
        currentIndex = 0;
      }
      setDebug(videoInputs.map((d, i) => {
        const label = d.label || "(未授权，名称不可见)";
        return `[${i}] ${label} | deviceId=${d.deviceId}`;
      }).join("\n"));
    }

    function pickLogitechIndex() {
      return videoInputs.findIndex((d) => {
        const name = (d.label || "").toLowerCase();
        return name.includes("logitech") || name.includes("c270");
      });
    }

    async function startPreview() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("当前浏览器不支持 mediaDevices.getUserMedia。");
        }
        stopCurrentStream();

        await loadCameraList();
        const logitechIndex = pickLogitechIndex();
        if (logitechIndex >= 0) {
          currentIndex = logitechIndex;
        }
        const selected = videoInputs[currentIndex];

        stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            deviceId: selected ? { exact: selected.deviceId } : undefined,
            width: { ideal: 1280 },
            height: { ideal: 720 },
          },
        });

        previewEl.srcObject = stream;
        const name = selected.label || `摄像头 ${currentIndex + 1}`;
        const secureTip = window.isSecureContext ? "安全上下文: 是" : "安全上下文: 否";
        setStatus(`预览已启动: ${name} (${secureTip})`);
      } catch (err) {
        const code = err && err.name ? err.name : "UnknownError";
        const message = err && err.message ? err.message : String(err);
        setStatus(`启动失败 [${code}]: ${message}`, true);
      }
    }

    async function switchCamera() {
      try {
        await loadCameraList();
        if (videoInputs.length <= 1) {
          setStatus("只有一个摄像头设备，无需切换。");
          return;
        }
        currentIndex = (currentIndex + 1) % videoInputs.length;
        await startPreview();
      } catch (err) {
        const message = err && err.message ? err.message : String(err);
        setStatus(`切换失败: ${message}`, true);
      }
    }

    function takeSnapshot() {
      if (!stream) {
        setStatus("请先启动预览后再拍照。", true);
        return;
      }

      const width = previewEl.videoWidth;
      const height = previewEl.videoHeight;
      if (!width || !height) {
        setStatus("视频还未准备好，请稍后再试。", true);
        return;
      }

      snapshotEl.width = width;
      snapshotEl.height = height;
      const ctx = snapshotEl.getContext("2d");
      ctx.drawImage(previewEl, 0, 0, width, height);
      snapshotEl.style.display = "block";
      setStatus("拍照成功：下方显示当前帧截图。");
    }

    startBtn.addEventListener("click", startPreview);
    stopBtn.addEventListener("click", () => {
      stopCurrentStream();
      setStatus("预览已停止。");
    });
    switchBtn.addEventListener("click", switchCamera);
    snapshotBtn.addEventListener("click", takeSnapshot);

    window.addEventListener("beforeunload", stopCurrentStream);
  </script>
</body>
</html>
